name = "ccl_codegen"
version = "1.0.0"
description = "Code generator for CCL decoder functions from Gleam type definitions"
licences = ["MIT"]
repository = { type = "github", user = "tylerbutler", repo = "ccl_gleam" }
target = "erlang"
gleam = ">= 1.11.0"

[dependencies]
ccl = { path = "../.." }
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
simplifile = ">= 2.0.0 and < 3.0.0"
argv = ">= 1.0.0 and < 2.0.0"
glint = ">= 1.2.0 and < 2.0.0"

[dev-dependencies]
startest = ">= 0.8.0 and < 1.0.0"
