name = "ccl_test_runner"
version = "1.0.0"
description = "CCL test runner, CLI, and TUI in Gleam"
licences = ["MIT"]
repository = { type = "github", user = "tylerbutler", repo = "ccl_gleam" }
target = "erlang"
gleam = ">= 1.11.0"

[dependencies]
ccl = { path = "../.." }
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
simplifile = ">= 2.0.0 and < 3.0.0"
birch = ">= 0.1.0 and < 1.0.0"
argv = ">= 1.0.0 and < 2.0.0"
glint = ">= 1.2.0 and < 2.0.0"
shore = ">= 1.3.0 and < 2.0.0"
gleam_erlang = ">= 1.0.0 and < 2.0.0"
gleam_otp = ">= 1.0.0 and < 2.0.0"
filepath = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
startest = ">= 0.8.0 and < 1.0.0"
