# yaml-language-server: $schema=https://raw.githubusercontent.com/CatConfLang/ccl-test-data/main/ccl-config-schema.json

# CCL Implementation Configuration
# Declares capabilities for the Gleam CCL implementation.
# Used by the test runner to filter tests to only those this implementation supports.

# Required: Functions this implementation supports
functions:
  - parse
  - parse_indented
  - build_hierarchy
  - get_string
  - get_int
  - get_bool
  - get_float
  - get_list
  - filter
  - canonical_format

# Optional: Features this implementation supports.
# Features are declarative (for capability reporting); they do not gate tests.
features:
  - comments
  - empty_keys
  - multiline_continuation
  - multiline_keys
  - optional_typed_accessors
  - toplevel_indent_strip
  - unicode
  - whitespace

# Optional: Behavioral choices (both sides of supported pairs)
behaviors:
  - array_order_insertion
  - array_order_lexicographic
  - boolean_lenient
  - boolean_strict
  - continuation_tab_preserve
  - continuation_tab_to_space
  - crlf_normalize_to_lf
  - crlf_preserve_literal
  - delimiter_first_equals
  - delimiter_prefer_spaced
  - indent_spaces
  - indent_tabs
  - list_coercion_disabled
  - list_coercion_enabled
  - multiline_values
  - path_traversal

# Optional: Specification variant
variants:
  - reference_compliant
