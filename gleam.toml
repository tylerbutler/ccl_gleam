# CCL Gleam Multipackage Project
# 
# This directory contains multiple Gleam packages for CCL implementation.
# Since Gleam doesn't currently support official workspace configuration,
# build each package individually:
#
# cd packages/ccl_core && gleam build
# cd packages/ccl && gleam build  
# cd packages/ccl_test_loader && gleam build
#
# Individual packages:
# - packages/ccl_core/      - Minimal CCL parsing (zero dependencies)
# - packages/ccl/           - Full-featured library with typed parsing
# - packages/ccl_test_loader/ - JSON test suite utilities
